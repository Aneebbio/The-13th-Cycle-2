<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 13th Cycle - Production Alpha</title>
    <style>
        :root { --cyan: #00ffcc; --dark: #050505; --panel: #0a0a0a; --border: #004444; }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: var(--cyan); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }

        /* --- UI LAYOUT --- */
        #top-tabs { height: 60px; background: var(--panel); border-bottom: 2px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .tab-btn { background: transparent; border: 1px solid var(--border); color: #008888; padding: 8px 20px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { border-color: var(--cyan); color: var(--cyan); background: #002222; }
        #top-vitals { margin-left: auto; font-size: 0.9em; display: flex; gap: 15px; align-items: center; }
        .vital-bar { display: inline-block; width: 80px; height: 8px; background: #002222; border: 1px solid var(--border); vertical-align: middle; margin-left: 4px; }
        .vital-bar-fill { height: 100%; transition: width 0.5s, background 0.5s; }

        #main-wrapper { display: flex; height: calc(100vh - 60px); }
        #sidebar { width: 220px; background: #080808; border-right: 1px solid #111; padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

        #game-window { flex-grow: 1; padding: 20px; position: relative; overflow-y: auto; }

        /* --- MAP & TILES --- */
        #map-container {
            width: 100%; height: 500px; background: #000; border: 1px solid var(--border);
            position: relative; overflow: hidden; image-rendering: pixelated;
        }
        .map-tile {
            position: absolute; width: 64px; height: 64px;
            transform: translate(-50%, -50%); cursor: pointer; z-index: 5;
            transition: filter 0.2s;
        }
        .map-tile:hover { filter: brightness(1.4); }
        /* SVG tile fallback renders inline — no external asset needed */
        .map-tile svg { width: 100%; height: 100%; display: block; }
        .map-tile .tile-label {
            position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
            font-size: 0.55em; color: #00ffcc99; white-space: nowrap; pointer-events: none;
        }
        .player-marker {
            width: 20px; height: 20px; background: var(--cyan); border-radius: 50%;
            box-shadow: 0 0 15px var(--cyan); z-index: 100; position: absolute;
            transform: translate(-50%, -50%); transition: left 0.3s, top 0.3s;
            pointer-events: none;
        }

        /* --- EVENT LOG --- */
        #event-log { margin-top: 20px; color: #555; font-size: 0.8em; border-top: 1px solid #111; padding-top: 10px; max-height: 120px; overflow-y: auto; }
        #event-log .log-line { margin: 2px 0; }
        #event-log .log-line.important { color: #00ffcc99; }
        #event-log .log-line.warning { color: #ff6600cc; }

        /* --- SIDEBAR BUTTONS --- */
        .sub-btn { width: 100%; text-align: left; background: #001111; border: 1px solid #003333; color: #00ccaa; padding: 10px; cursor: pointer; margin-bottom: 5px; transition: background 0.2s; }
        .sub-btn:hover { background: #002222; }
        .sub-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* --- BASE VIEW --- */
        .structure-card { background: #001111; border: 1px solid #003333; padding: 12px; margin-bottom: 8px; }
        .structure-card h4 { margin: 0 0 6px; color: var(--cyan); }
        .structure-card p { margin: 0; color: #555; font-size: 0.8em; }

        /* --- INVENTORY VIEW --- */
        .inv-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; }
        .inv-row:last-child { border-bottom: none; }

        /* --- GAME OVER --- */
        #game-over-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 999; align-items: center; justify-content: center; flex-direction: column;
        }
        #game-over-overlay.active { display: flex; }
        #game-over-overlay h1 { color: #ff0044; font-size: 3em; margin-bottom: 20px; text-shadow: 0 0 30px #ff0044; }
        #game-over-overlay button { background: #220000; border: 1px solid #ff0044; color: #ff0044; padding: 12px 30px; cursor: pointer; font-family: inherit; font-size: 1em; }
    </style>
</head>
<body>

    <nav id="top-tabs">
        <button class="tab-btn active" data-tab="explore" onclick="switchTab('explore')">EXPLORE</button>
        <button class="tab-btn" data-tab="base" onclick="switchTab('base')">BASE</button>
        <button class="tab-btn" data-tab="inventory" onclick="switchTab('inventory')">INVENTORY</button>
        <div id="top-vitals">
            OXY: <span id="oxy-val">100</span>%
            <span class="vital-bar"><span class="vital-bar-fill" id="oxy-bar" style="width:100%;background:#00ffcc;"></span></span>
            ENG: <span id="eng-val">100</span>%
            <span class="vital-bar"><span class="vital-bar-fill" id="eng-bar" style="width:100%;background:#ffcc00;"></span></span>
        </div>
    </nav>

    <div id="main-wrapper">
        <aside id="sidebar">
            <div style="font-size: 0.7em; color: #444; letter-spacing: 0.1em;">ACTIONS</div>
            <div id="sub-tabs-content"></div>
            <hr style="border:0; border-top:1px solid #222; margin: 10px 0; flex-shrink:0;">
            <button class="sub-btn" style="background:#220000; border-color:#440000; color:#ff6644;" onclick="saveGame()">&#128190; FORCE SAVE</button>
            <button class="sub-btn" style="background:#001100; border-color:#003300; color:#44ff66;" onclick="newGame()">&#8635; NEW GAME</button>
            <div id="save-status" style="font-size:0.65em; color:#333; text-align:center;"></div>
        </aside>

        <main id="game-window">
            <div id="view-explore" class="tab-view">
                <div id="map-container"></div>
                <div id="event-log"></div>
            </div>
            <div id="view-base" class="tab-view" style="display:none;">
                <h2 style="margin-top:0;">Construction Yard</h2>
                <div id="structure-list"></div>
            </div>
            <div id="view-inventory" class="tab-view" style="display:none;">
                <h2 style="margin-top:0;">Cargo Hold</h2>
                <div id="inv-list"></div>
            </div>
        </main>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay">
        <h1>[ SIGNAL LOST ]</h1>
        <p style="color:#666; margin-bottom:30px;">Oxygen supply depleted. Cycle ended.</p>
        <button onclick="newGame()">RESTART CYCLE</button>
    </div>

    <script>
    // ============================================================
    // 1. CONSTANTS & BLUEPRINTS
    // ============================================================
    const SAVE_KEY = 'cycle_save_v2'; // bump version to avoid loading corrupt old saves
    const AUTO_SAVE_INTERVAL = 30; // auto-save every 30 game ticks
    const OXY_DRAIN = 0.05;         // per tick
    const ENG_DRAIN = 0.02;         // per tick

    // Building blueprints
    const BLUEPRINTS = {
        windmill: {
            name: 'Windmill',
            desc: 'Generates energy over time. Costs 5 iron.',
            cost: { iron: 5 },
            effect: { eng_regen: 0.1 },
            color: '#ffcc00',
            shape: 'windmill'
        },
        oxyplant: {
            name: 'Oxy Plant',
            desc: 'Replenishes oxygen supply. Costs 8 iron.',
            cost: { iron: 8 },
            effect: { oxy_regen: 0.08 },
            color: '#00ffcc',
            shape: 'oxyplant'
        }
    };

    // ============================================================
    // 2. DEFAULT STATE FACTORY (always create fresh to avoid reference bugs)
    // ============================================================
    function defaultState() {
        return {
            pos: { x: 50, y: 50 },
            vitals: { oxy: 100, eng: 100 },
            inventory: { iron: 10, tiles: 5 },
            structures: [
                { id: 'hub', type: 'hub', name: 'Origin Hub', x: 50, y: 50, color: '#00ffcc', shape: 'hub' }
            ],
            tick: 0,
            log: ['> System initialized. Awaiting commands...']
        };
    }

    // ============================================================
    // 3. GAME STATE — loaded or freshly created
    // ============================================================
    let state = defaultState();

    // ============================================================
    // 4. SAVE / LOAD  (deep-merge to protect against schema drift)
    // ============================================================
    function saveGame(silent = false) {
        try {
            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
            const ts = new Date().toLocaleTimeString();
            document.getElementById('save-status').innerText = `Saved ${ts}`;
            if (!silent) addLog('> Data synchronized.', 'important');
        } catch (e) {
            addLog('> SAVE FAILED: ' + e.message, 'warning');
        }
    }

    function loadGame() {
        try {
            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return;
            const saved = JSON.parse(raw);

            // Deep-merge: start from defaults, overlay saved data field-by-field
            const fresh = defaultState();
            state = {
                pos:        Object.assign({}, fresh.pos,        saved.pos        || {}),
                vitals:     Object.assign({}, fresh.vitals,     saved.vitals     || {}),
                inventory:  Object.assign({}, fresh.inventory,  saved.inventory  || {}),
                structures: Array.isArray(saved.structures) && saved.structures.length
                                ? saved.structures
                                : fresh.structures,
                tick:       typeof saved.tick === 'number' ? saved.tick : 0,
                log:        Array.isArray(saved.log) ? saved.log : fresh.log
            };

            // Clamp vitals in case of corrupted save
            state.vitals.oxy = Math.max(0, Math.min(100, state.vitals.oxy));
            state.vitals.eng = Math.max(0, Math.min(100, state.vitals.eng));
        } catch (e) {
            console.warn('[13th Cycle] Load failed, using fresh state:', e);
            state = defaultState();
        }
    }

    function newGame() {
        if (!confirm('Start a new cycle? All progress will be lost.')) return;
        localStorage.removeItem(SAVE_KEY);
        state = defaultState();
        document.getElementById('game-over-overlay').classList.remove('active');
        init();
    }

    // ============================================================
    // 5. GAME LOOP
    // ============================================================
    let loopHandle = null;

    function gameLoop() {
        state.tick++;

        // Calculate regen from structures
        let oxyRegen = 0, engRegen = 0;
        state.structures.forEach(s => {
            const bp = BLUEPRINTS[s.type];
            if (bp && bp.effect) {
                if (bp.effect.oxy_regen) oxyRegen += bp.effect.oxy_regen;
                if (bp.effect.eng_regen) engRegen += bp.effect.eng_regen;
            }
        });

        // Apply drain & regen
        state.vitals.oxy = Math.max(0, Math.min(100, state.vitals.oxy - OXY_DRAIN + oxyRegen));
        state.vitals.eng = Math.max(0, Math.min(100, state.vitals.eng - ENG_DRAIN + engRegen));

        // Check game-over
        if (state.vitals.oxy <= 0) {
            triggerGameOver();
            return;
        }

        // Auto-save
        if (state.tick % AUTO_SAVE_INTERVAL === 0) saveGame(true);

        // Warn at low oxygen
        if (Math.floor(state.vitals.oxy) === 20) addLog('> WARNING: Oxygen critical!', 'warning');

        updateVitalsUI();
    }

    function triggerGameOver() {
        clearInterval(loopHandle);
        saveGame(true);
        document.getElementById('game-over-overlay').classList.add('active');
    }

    // ============================================================
    // 6. ACTIONS
    // ============================================================
    function movePlayer(x, y, name) {
        state.pos.x = x;
        state.pos.y = y;
        addLog(`> Moved to: ${name}`);
        renderMap();
    }

    function build(type) {
        const bp = BLUEPRINTS[type];
        if (!bp) { addLog(`> Unknown blueprint: ${type}`, 'warning'); return; }

        // Check resources
        for (const [resource, amount] of Object.entries(bp.cost)) {
            if ((state.inventory[resource] || 0) < amount) {
                addLog(`> Build failed: need ${amount} ${resource}.`, 'warning');
                return;
            }
        }

        // Deduct resources
        for (const [resource, amount] of Object.entries(bp.cost)) {
            state.inventory[resource] -= amount;
        }

        // Place at a random nearby position (avoid exact overlaps)
        const nx = Math.min(90, Math.max(10, state.pos.x + (Math.random() * 20 - 10)));
        const ny = Math.min(90, Math.max(10, state.pos.y + (Math.random() * 20 - 10)));

        state.structures.push({
            id: type + '_' + Date.now(),
            type,
            name: bp.name,
            x: nx,
            y: ny,
            color: bp.color,
            shape: bp.shape
        });

        addLog(`> ${bp.name} constructed.`, 'important');
        renderMap();
        renderBase();
        renderInventory();
        renderSubTabs('base'); // refresh button states
    }

    // ============================================================
    // 7. SVG TILE RENDERER (no external assets needed)
    // ============================================================
    function makeTileSVG(shape, color) {
        const c = color || '#00ffcc';
        switch (shape) {
            case 'hub':
                return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="8" width="48" height="48" rx="4" fill="none" stroke="${c}" stroke-width="2"/>
                    <circle cx="32" cy="32" r="10" fill="${c}" opacity="0.8"/>
                    <line x1="32" y1="8" x2="32" y2="22" stroke="${c}" stroke-width="1.5"/>
                    <line x1="32" y1="42" x2="32" y2="56" stroke="${c}" stroke-width="1.5"/>
                    <line x1="8" y1="32" x2="22" y2="32" stroke="${c}" stroke-width="1.5"/>
                    <line x1="42" y1="32" x2="56" y2="32" stroke="${c}" stroke-width="1.5"/>
                </svg>`;
            case 'windmill':
                return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <rect x="29" y="32" width="6" height="24" fill="${c}" opacity="0.6"/>
                    <polygon points="32,8 24,28 40,28" fill="${c}" opacity="0.9"/>
                    <polygon points="32,28 12,20 20,34" fill="${c}" opacity="0.9"/>
                    <polygon points="32,28 52,36 44,22" fill="${c}" opacity="0.9"/>
                    <circle cx="32" cy="28" r="4" fill="${c}"/>
                </svg>`;
            case 'oxyplant':
                return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <rect x="20" y="40" width="24" height="16" rx="2" fill="${c}" opacity="0.5"/>
                    <ellipse cx="32" cy="30" rx="16" ry="12" fill="none" stroke="${c}" stroke-width="2"/>
                    <ellipse cx="32" cy="22" rx="10" ry="8" fill="${c}" opacity="0.3"/>
                    <text x="32" y="35" text-anchor="middle" fill="${c}" font-size="10" font-family="monospace">O₂</text>
                </svg>`;
            default:
                return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <rect x="12" y="12" width="40" height="40" fill="none" stroke="${c}" stroke-width="2"/>
                </svg>`;
        }
    }

    // ============================================================
    // 8. RENDERING
    // ============================================================
    function renderMap() {
        const mc = document.getElementById('map-container');
        mc.innerHTML = '';

        // Draw structures
        state.structures.forEach(s => {
            const el = document.createElement('div');
            el.className = 'map-tile';
            el.style.left = `${s.x}%`;
            el.style.top  = `${s.y}%`;
            el.innerHTML  = makeTileSVG(s.shape, s.color);
            el.title = s.name;

            const label = document.createElement('span');
            label.className = 'tile-label';
            label.innerText = s.name;
            el.appendChild(label);

            el.onclick = () => movePlayer(s.x, s.y, s.name);
            mc.appendChild(el);
        });

        // Draw player marker
        const p = document.createElement('div');
        p.className = 'player-marker';
        p.style.left = `${state.pos.x}%`;
        p.style.top  = `${state.pos.y}%`;
        p.title = 'Your position';
        mc.appendChild(p);
    }

    function renderBase() {
        const list = document.getElementById('structure-list');
        if (!list) return;
        list.innerHTML = '';

        if (state.structures.length === 0) {
            list.innerHTML = '<p style="color:#333;">No structures built yet.</p>';
            return;
        }

        state.structures.forEach(s => {
            const card = document.createElement('div');
            card.className = 'structure-card';
            const bp = BLUEPRINTS[s.type];
            const effectText = bp
                ? Object.entries(bp.effect).map(([k,v]) => `${k}: +${v}/tick`).join(', ')
                : 'Passive';
            card.innerHTML = `<h4>${makeTileSVG(s.shape, s.color).replace('</svg>', '') + `<text x="50" y="50" fill="${s.color}" font-size="8" text-anchor="middle"></text></svg>`} ${s.name}</h4><p>${effectText}</p>`;
            // Simpler version:
            card.innerHTML = `<h4 style="color:${s.color};">${s.name}</h4><p>${bp ? bp.desc : 'Starting point.'}</p>`;
            list.appendChild(card);
        });
    }

    function renderInventory() {
        const list = document.getElementById('inv-list');
        if (!list) return;
        list.innerHTML = '';

        const entries = Object.entries(state.inventory);
        if (entries.length === 0) {
            list.innerHTML = '<p style="color:#333;">Cargo hold empty.</p>';
            return;
        }

        entries.forEach(([item, qty]) => {
            const row = document.createElement('div');
            row.className = 'inv-row';
            row.innerHTML = `<span>${item.toUpperCase()}</span><span style="color:#fff;">${qty}</span>`;
            list.appendChild(row);
        });
    }

    function renderSubTabs(id) {
        const container = document.getElementById('sub-tabs-content');
        if (id === 'explore') {
            container.innerHTML = `<button class="sub-btn" onclick="renderMap()">&#128269; REFRESH SCAN</button>`;
        } else if (id === 'base') {
            const btns = Object.entries(BLUEPRINTS).map(([type, bp]) => {
                const canAfford = Object.entries(bp.cost).every(([r, amt]) => (state.inventory[r] || 0) >= amt);
                const costStr = Object.entries(bp.cost).map(([r,a]) => `${a} ${r}`).join(', ');
                return `<button class="sub-btn" onclick="build('${type}')" ${canAfford ? '' : 'disabled'}>
                    BUILD ${bp.name.toUpperCase()}<br>
                    <span style="font-size:0.7em;color:#555;">${costStr}</span>
                </button>`;
            }).join('');
            container.innerHTML = btns;
        } else {
            container.innerHTML = '';
        }
    }

    function updateVitalsUI() {
        const oxy = state.vitals.oxy;
        const eng = state.vitals.eng;

        document.getElementById('oxy-val').innerText  = Math.floor(oxy);
        document.getElementById('eng-val').innerText  = Math.floor(eng);

        const oxyBar  = document.getElementById('oxy-bar');
        const engBar  = document.getElementById('eng-bar');
        oxyBar.style.width  = `${oxy}%`;
        engBar.style.width  = `${eng}%`;
        oxyBar.style.background = oxy < 25 ? '#ff4444' : oxy < 50 ? '#ffaa00' : '#00ffcc';
        engBar.style.background = eng < 25 ? '#ff4444' : eng < 50 ? '#ffaa00' : '#ffcc00';
    }

    // ============================================================
    // 9. EVENT LOG
    // ============================================================
    function addLog(message, type = '') {
        state.log.push(message); // persist log in state
        if (state.log.length > 50) state.log.shift(); // cap at 50 lines

        const logEl = document.getElementById('event-log');
        if (!logEl) return;

        const line = document.createElement('div');
        line.className = `log-line ${type}`;
        line.innerText = message;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight; // auto-scroll to latest
    }

    function restoreLog() {
        const logEl = document.getElementById('event-log');
        if (!logEl) return;
        logEl.innerHTML = '';
        state.log.forEach(msg => {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerText = msg;
            logEl.appendChild(line);
        });
        logEl.scrollTop = logEl.scrollHeight;
    }

    // ============================================================
    // 10. TAB SWITCHING
    // ============================================================
    function switchTab(id) {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        const target = document.getElementById(`view-${id}`);
        if (target) target.style.display = 'block';

        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tab === id);
        });

        renderSubTabs(id);

        if (id === 'explore')   renderMap();
        if (id === 'base')      renderBase();
        if (id === 'inventory') renderInventory();
    }

    // ============================================================
    // 11. INIT
    // ============================================================
    function init() {
        clearInterval(loopHandle); // clear any existing loop before starting
        loadGame();
        updateVitalsUI();
        switchTab('explore');
        restoreLog();
        loopHandle = setInterval(gameLoop, 1000);
    }

    window.onload = init;
    </script>
</body>
</html>
